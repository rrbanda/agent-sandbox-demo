##
## Act 1: The Threat -- A bare pod with no agent-sandbox controls.
##
## This pod has:
##   - Default service account token mounted (automountServiceAccountToken not set)
##   - No NetworkPolicy restricting egress
##   - No explicit security hardening beyond OpenShift's default SCC
##
## It represents what most teams deploy today when running agent workloads.
##
apiVersion: v1
kind: Pod
metadata:
  name: bare-agent
  namespace: agent-demo
  labels:
    app: bare-agent
    demo: act1-threat
spec:
  automountServiceAccountToken: true
  containers:
  - name: agent
    image: docker.io/library/python:3.12-slim
    command: ["python3", "-c", "import time; time.sleep(86400)"]
    ports:
    - containerPort: 8888
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
